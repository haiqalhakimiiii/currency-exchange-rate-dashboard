<mat-form-field class="dropdown-field">
  <mat-label>{{ labelText() }}</mat-label>
  <input
    type="text"
    matInput
    [value]="searchText()"
    (input)="onSearchTextChange($any($event.target).value)"
    [disabled]="disabled()"
    [attr.aria-label]="ariaLabel() || labelText()"
    [placeholder]="placeholder()"
    [matAutocomplete]="auto"
    autocomplete="off"
  >
  <mat-autocomplete
    #auto="matAutocomplete"
    autoActiveFirstOption
    [displayWith]="displayOption.bind(this)"
    (optionSelected)="selectOption($event.option.value)"
  >
    @for (option of filteredOptions(); track option.value) {
      <mat-option [value]="option">
        {{ option.label }}
      </mat-option>
    }
  </mat-autocomplete>
</mat-form-field>
